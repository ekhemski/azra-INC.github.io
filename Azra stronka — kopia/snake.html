<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Neon – Azra</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;overflow:hidden}
canvas{border:2px solid #10b981;border-radius:8px;box-shadow:0 0 30px rgba(16,185,129,.4)}
#info{margin-bottom:10px;font-weight:700;font-size:1.2rem;text-shadow:0 0 10px rgba(16,185,129,.8)}
#start{position:absolute;text-align:center}
#start h1{font-size:2.5rem;background:linear-gradient(135deg,#10b981,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
#sBtn{padding:1rem 3rem;font-size:1.2rem;font-weight:700;border:none;border-radius:8px;background:linear-gradient(135deg,#10b981,#06b6d4);color:#fff;cursor:pointer}
#sBtn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(16,185,129,.6)}
#mob{position:absolute;bottom:10px;display:none;gap:5px}
#mob button{width:60px;height:60px;border-radius:50%;border:2px solid #10b981;background:rgba(16,185,129,.2);color:#fff;font-size:1.3rem;cursor:pointer}
@media(max-width:500px){#mob{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(2,60px);justify-items:center}}
</style>
</head>
<body>
<div id="info" style="display:none">🐍 Wynik: <span id="sc">0</span></div>
<div id="start"><h1>🐍 SNAKE NEON</h1><p style="color:#aaa;margin-bottom:1rem">Strzałki lub WASD</p><button id="sBtn" onclick="startGame()">GRAJ</button></div>
<canvas id="c" style="display:none"></canvas>
<div id="mob">
    <div></div><button ontouchstart="setDir(0,-1)">▲</button><div></div>
    <button ontouchstart="setDir(-1,0)">◀</button><button ontouchstart="setDir(0,1)">▼</button><button ontouchstart="setDir(1,0)">▶</button>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const G=20; // grid size
let cols,rows,snake,food,dir,ndir,score,run,timer;

function startGame(){
    document.getElementById('start').style.display='none';c.style.display='block';document.getElementById('info').style.display='block';
    let s=Math.min(400,window.innerWidth-20);
    cols=Math.floor(s/G);rows=Math.floor(Math.min(400,window.innerHeight-120)/G);
    c.width=cols*G;c.height=rows*G;
    snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];
    dir={x:1,y:0};ndir={x:1,y:0};score=0;run=true;
    placeFood();
    if(timer)clearInterval(timer);
    timer=setInterval(tick,120);
}

function placeFood(){
    do{food={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}}
    while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function setDir(dx,dy){if(dir.x!==-dx||dir.y!==-dy)ndir={x:dx,y:dy}}

function tick(){
    if(!run)return;
    dir=ndir;
    let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    // Ściany
    if(head.x<0||head.x>=cols||head.y<0||head.y>=rows){gameOver();return}
    // Kolizja z sobą
    if(snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return}
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){score++;placeFood()}else snake.pop();
    draw();
    document.getElementById('sc').textContent=score;
}

function draw(){
    x.fillStyle='#0a0a1a';x.fillRect(0,0,c.width,c.height);
    // Grid
    x.strokeStyle='rgba(255,255,255,.03)';
    for(let i=0;i<cols;i++)for(let j=0;j<rows;j++){x.strokeRect(i*G,j*G,G,G)}
    // Snake
    snake.forEach((s,i)=>{
        let pct=1-i/snake.length*.5;
        x.fillStyle=`rgba(16,185,129,${pct})`;
        x.fillRect(s.x*G+1,s.y*G+1,G-2,G-2);
        if(i===0){
            x.fillStyle='#fff';x.fillRect(s.x*G+4,s.y*G+4,4,4);x.fillRect(s.x*G+G-8,s.y*G+4,4,4);
        }
    });
    // Food
    x.fillStyle='#ef4444';x.beginPath();x.arc(food.x*G+G/2,food.y*G+G/2,G/2-2,0,Math.PI*2);x.fill();
    x.fillStyle='#fff';x.font='12px sans-serif';x.textAlign='center';x.textBaseline='middle';
    x.fillText('🍎',food.x*G+G/2,food.y*G+G/2);
}

function gameOver(){
    run=false;clearInterval(timer);
    x.fillStyle='rgba(0,0,0,.7)';x.fillRect(0,0,c.width,c.height);
    x.fillStyle='#fff';x.font='bold 28px sans-serif';x.textAlign='center';
    x.fillText('KONIEC!',c.width/2,c.height/2-20);
    x.font='20px sans-serif';x.fillText('Wynik: '+score,c.width/2,c.height/2+15);
    x.font='14px sans-serif';x.fillStyle='#10b981';x.fillText('Kliknij aby zagrać ponownie',c.width/2,c.height/2+50);
    try{window.parent.postMessage({type:'azra_score',score:score*20},'*')}catch(e){}
    c.onclick=()=>{c.onclick=null;startGame()};
}

document.addEventListener('keydown',e=>{
    switch(e.key){case'ArrowUp':case'w':setDir(0,-1);break;case'ArrowDown':case's':setDir(0,1);break;case'ArrowLeft':case'a':setDir(-1,0);break;case'ArrowRight':case'd':setDir(1,0);break}
});
</script>
</body>
</html>
