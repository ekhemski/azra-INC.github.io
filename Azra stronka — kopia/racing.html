<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Street Racer 3D – Azra</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff;touch-action:none;user-select:none}
canvas{display:block}

/* ===== VIGNETTE OVERLAY ===== */
#vignette{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;
    background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(0,0,0,.55) 100%)}
#speedLines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:0;transition:opacity .3s;
    background:repeating-conic-gradient(rgba(100,180,255,.03) 0deg,transparent 1deg,transparent 9deg) center/100% 100%}
#speedLines.on{opacity:1}

/* ===== HUD ===== */
#hud{position:fixed;top:0;left:0;width:100%;padding:12px 16px;z-index:10;pointer-events:none;display:none}
#hud.on{display:block}
.hud-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.hud-box{background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 14px;min-width:80px}
.hud-val{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hud-lbl{font-size:.55rem;color:rgba(255,255,255,.4);letter-spacing:1.5px;font-weight:700}

/* ===== SPEEDOMETER ===== */
#speedometer{position:fixed;bottom:20px;right:20px;z-index:10;display:none}
#speedometer.on{display:flex}
.speedo{width:120px;height:120px;border-radius:50%;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);border:2px solid rgba(168,85,247,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.speedo-val{font-size:2.2rem;font-weight:900;color:#fff;line-height:1}
.speedo-unit{font-size:.55rem;color:rgba(255,255,255,.4);letter-spacing:2px;margin-top:2px}
.speedo-arc{position:absolute;top:-3px;left:-3px;width:126px;height:126px}

/* ===== NITRO ===== */
#nitroWrap{position:fixed;bottom:20px;left:20px;z-index:10;display:none;flex-direction:column;align-items:center;gap:4px}
#nitroWrap.on{display:flex}
.nitro-bar{width:24px;height:110px;border-radius:12px;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);border:1px solid rgba(6,182,212,.3);overflow:hidden;position:relative}
.nitro-fill{position:absolute;bottom:0;width:100%;border-radius:0 0 12px 12px;background:linear-gradient(180deg,#06b6d4,#3b82f6);transition:height .15s}
.nitro-lbl{font-size:.5rem;color:rgba(6,182,212,.7);letter-spacing:2px;font-weight:700}

/* ===== MENU ===== */
#menu{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    background:linear-gradient(180deg,rgba(5,0,20,.95) 0%,rgba(10,5,30,.9) 50%,rgba(5,0,20,.95) 100%);backdrop-filter:blur(10px)}
#menu.hide{display:none}
#menu h1{font-size:clamp(2rem,6vw,3.5rem);letter-spacing:6px;background:linear-gradient(135deg,#a855f7,#ec4899,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;text-align:center}
#menu h1 small{display:block;font-size:clamp(.6rem,2vw,1rem);letter-spacing:8px;-webkit-text-fill-color:rgba(255,255,255,.25)}
#menu .sub{color:rgba(255,255,255,.35);font-size:.8rem;text-align:center;max-width:350px;line-height:1.5}
.colors{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.color-btn{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.1);cursor:pointer;transition:all .3s;position:relative}
.color-btn:hover{transform:scale(1.15)}
.color-btn.sel{border-color:#fff;box-shadow:0 0 20px currentColor}
.color-btn::after{content:'';position:absolute;top:50%;left:50%;width:20px;height:20px;border-radius:50%;background:currentColor;transform:translate(-50%,-50%)}
.go-btn{padding:16px 60px;font-size:1.3rem;font-weight:800;border:none;border-radius:14px;background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;cursor:pointer;letter-spacing:4px;transition:all .3s;font-family:inherit;margin-top:8px}
.go-btn:hover{transform:scale(1.05);box-shadow:0 0 40px rgba(168,85,247,.5)}
.ctrl-info{color:rgba(255,255,255,.2);font-size:.65rem;letter-spacing:1px;text-align:center;line-height:1.8}

/* ===== GAME OVER ===== */
#gameOver{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    background:rgba(0,0,0,.75);backdrop-filter:blur(8px)}
#gameOver.on{display:flex}
#gameOver h2{font-size:2.2rem;letter-spacing:4px;background:linear-gradient(135deg,#ef4444,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.go-stats{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.go-stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 20px;text-align:center;min-width:100px}
.go-stat .v{font-size:1.4rem;font-weight:900;color:#a855f7}
.go-stat .l{font-size:.55rem;color:rgba(255,255,255,.35);letter-spacing:1.5px;font-weight:700}
.go-reward{color:#10b981;font-weight:700;font-size:.95rem;margin:4px 0}

/* ===== MOBILE ===== */
#mobileUI{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:10;display:none;gap:12px;align-items:center}
.mob-btn{width:70px;height:70px;border-radius:50%;border:2px solid rgba(168,85,247,.3);background:rgba(168,85,247,.08);color:rgba(255,255,255,.6);font-size:1.5rem;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.mob-btn:active{background:rgba(168,85,247,.3);border-color:rgba(168,85,247,.6)}
.mob-btn.nitro{border-color:rgba(6,182,212,.3);background:rgba(6,182,212,.08);font-size:.7rem;font-weight:800;letter-spacing:1px}
.mob-btn.nitro:active{background:rgba(6,182,212,.3)}

/* ===== LOADING ===== */
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#050010;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
.ld-spinner{width:50px;height:50px;border:3px solid rgba(168,85,247,.2);border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{font-size:1.5rem;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ld-sub{color:rgba(255,255,255,.3);font-size:.7rem}

@media(max-width:768px){
    .speedo{width:90px;height:90px}
    .speedo-val{font-size:1.6rem}
    .speedo-arc{width:96px;height:96px}
    .nitro-bar{height:80px}
    #mobileUI{display:flex}
}
@media(max-width:480px){
    .hud-box{padding:5px 10px;min-width:60px}
    .hud-val{font-size:1rem}
    #speedometer{bottom:85px;right:10px}
    #nitroWrap{bottom:85px;left:10px}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading"><div class="ld-spinner"></div><div class="ld-text">AZRA</div><div class="ld-sub">Ładowanie silnika 3D...</div></div>

<!-- OVERLAYS -->
<div id="vignette"></div>
<div id="speedLines"></div>

<!-- HUD -->
<div id="hud">
    <div class="hud-row">
        <div class="hud-box"><div class="hud-lbl">DYSTANS</div><div class="hud-val" id="hDist">0 m</div></div>
        <div class="hud-box"><div class="hud-lbl">MONETY</div><div class="hud-val" id="hCoins">0</div></div>
        <div class="hud-box"><div class="hud-lbl">MNOŻNIK</div><div class="hud-val" id="hMulti">x1</div></div>
    </div>
</div>

<!-- SPEEDOMETER -->
<div id="speedometer">
    <div class="speedo">
        <svg class="speedo-arc" viewBox="0 0 126 126"><circle cx="63" cy="63" r="60" fill="none" stroke="rgba(168,85,247,.15)" stroke-width="3"/>
        <circle id="speedArc" cx="63" cy="63" r="60" fill="none" stroke="url(#sGrad)" stroke-width="3" stroke-dasharray="377" stroke-dashoffset="377" stroke-linecap="round" transform="rotate(-90 63 63)"/>
        <defs><linearGradient id="sGrad"><stop offset="0%" stop-color="#10b981"/><stop offset="50%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#ef4444"/></linearGradient></defs></svg>
        <div class="speedo-val" id="speedVal">0</div>
        <div class="speedo-unit">KM/H</div>
    </div>
</div>

<!-- NITRO -->
<div id="nitroWrap">
    <div class="nitro-bar"><div class="nitro-fill" id="nitroFill" style="height:100%"></div></div>
    <div class="nitro-lbl">N₂O</div>
</div>

<!-- MOBILE -->
<div id="mobileUI">
    <button class="mob-btn" id="mobL">◀</button>
    <button class="mob-btn nitro" id="mobN">N₂O</button>
    <button class="mob-btn" id="mobR">▶</button>
</div>

<!-- MENU -->
<div id="menu">
    <h1>STREET RACER<small>N E O N &nbsp; 3 D</small></h1>
    <div class="sub">Unikaj ruchu ulicznego, zbieraj monety i jedź jak najdalej przez neonowe miasto!</div>
    <div style="color:rgba(255,255,255,.3);font-size:.6rem;letter-spacing:2px;font-weight:700;margin-top:8px">KOLOR AUTA</div>
    <div class="colors" id="colorPicker"></div>
    <button class="go-btn" onclick="startGame()">🏁 JEDŹ!</button>
    <div class="ctrl-info">← → lub A/D – sterowanie &nbsp;|&nbsp; SHIFT – nitro<br>Na telefonie: przyciski na dole ekranu</div>
</div>

<!-- GAME OVER -->
<div id="gameOver">
    <h2>KONIEC JAZDY</h2>
    <div class="go-stats" id="goStats"></div>
    <div class="go-reward" id="goReward"></div>
    <div style="display:flex;gap:10px;margin-top:8px">
        <button class="go-btn" onclick="startGame()" style="padding:12px 40px;font-size:1rem">🔄 JESZCZE RAZ</button>
        <button class="go-btn" onclick="toMenu()" style="padding:12px 30px;font-size:.9rem;background:rgba(255,255,255,.1)">MENU</button>
    </div>
</div>

<!-- ============================================ -->
<!-- THREE.JS IMPORT                              -->
<!-- ============================================ -->
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

/* ============================================
   KONFIGURACJA
   ============================================ */
const LANE_W = 3.2;
const LANES = 5;
const ROAD_W = LANES * LANE_W;
const SIDE_W = 4;
const CHUNK = 140;
const POOL = 8;

const CAR_COLORS = [
    { name:'Fioletowy', hex:'#a855f7', three:0xa855f7 },
    { name:'Niebieski', hex:'#3b82f6', three:0x3b82f6 },
    { name:'Różowy',    hex:'#ec4899', three:0xec4899 },
    { name:'Czerwony',  hex:'#ef4444', three:0xef4444 },
    { name:'Zielony',   hex:'#10b981', three:0x10b981 },
    { name:'Złoty',     hex:'#f59e0b', three:0xf59e0b },
    { name:'Biały',     hex:'#e2e8f0', three:0xe2e8f0 },
    { name:'Cyan',      hex:'#06b6d4', three:0x06b6d4 },
];

const TRAFFIC_COLORS = [0x475569,0x64748b,0x334155,0x1e293b,0x78716c,0x374151,0x1f2937,0x292524];
const NEON_COLORS = [0xa855f7,0x3b82f6,0xec4899,0x06b6d4,0xf59e0b,0x10b981,0xef4444,0x8b5cf6,0xf472b6,0x22d3ee];

let selColor = 0;

/* ============================================
   RENDERER & SCENE
   ============================================ */
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference:'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.7;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);
scene.fog = new THREE.FogExp2(0x030310, 0.007);

const camera = new THREE.PerspectiveCamera(68, window.innerWidth/window.innerHeight, 0.1, 600);
camera.position.set(0, 5, -12);
camera.lookAt(0, 1, 10);

/* ============================================
   POST-PROCESSING (BLOOM)
   ============================================ */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const isMobile = /Mobi|Android/i.test(navigator.userAgent);
const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    isMobile ? 1.0 : 1.4,   // strength
    0.4,                      // radius
    0.5                       // threshold
);
composer.addPass(bloomPass);

/* ============================================
   LIGHTING
   ============================================ */
const ambLight = new THREE.AmbientLight(0x101025, 0.6);
scene.add(ambLight);

const moonLight = new THREE.DirectionalLight(0x4444aa, 0.4);
moonLight.position.set(-30, 50, 30);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(isMobile ? 1024 : 2048, isMobile ? 1024 : 2048);
moonLight.shadow.camera.near = 0.5;
moonLight.shadow.camera.far = 200;
moonLight.shadow.camera.left = -40;
moonLight.shadow.camera.right = 40;
moonLight.shadow.camera.top = 40;
moonLight.shadow.camera.bottom = -40;
scene.add(moonLight);

// Headlight spot
const headlightL = new THREE.SpotLight(0xffeedd, 30, 60, 0.4, 0.5, 1);
const headlightR = new THREE.SpotLight(0xffeedd, 30, 60, 0.4, 0.5, 1);
scene.add(headlightL, headlightR);
const hlTarget = new THREE.Object3D();
scene.add(hlTarget);
headlightL.target = hlTarget;
headlightR.target = hlTarget;

// Street point lights (recycled pool)
const stLights = [];
for (let i = 0; i < (isMobile ? 6 : 10); i++) {
    const pl = new THREE.PointLight(0xffaa55, 0.8, 35, 2);
    scene.add(pl);
    stLights.push(pl);
}

/* ============================================
   SKY & STARS
   ============================================ */
const skyGeo = new THREE.SphereGeometry(250, 32, 16);
const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
        topColor: { value: new THREE.Color(0x000008) },
        botColor: { value: new THREE.Color(0x0a0a30) },
        offset: { value: 20 },
        exp: { value: 0.4 },
    },
    vertexShader: `varying vec3 vWP; void main(){ vec4 wp=modelMatrix*vec4(position,1.0); vWP=wp.xyz; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `uniform vec3 topColor;uniform vec3 botColor;uniform float offset;uniform float exp;varying vec3 vWP;
        void main(){ float h=normalize(vWP+vec3(0,offset,0)).y; gl_FragColor=vec4(mix(botColor,topColor,max(pow(max(h,0.0),exp),0.0)),1.0); }`,
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// Stars
const starsGeo = new THREE.BufferGeometry();
const starsN = 800;
const starsArr = new Float32Array(starsN * 3);
for (let i = 0; i < starsN; i++) {
    const th = Math.random()*Math.PI*2, ph = Math.random()*Math.PI*0.45, r = 200;
    starsArr[i*3]   = r*Math.sin(ph)*Math.cos(th);
    starsArr[i*3+1] = r*Math.cos(ph) + 20;
    starsArr[i*3+2] = r*Math.sin(ph)*Math.sin(th);
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starsArr, 3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color:0xffffff, size:0.4, transparent:true, opacity:0.6 })));

/* ============================================
   GROUND (moves with player)
   ============================================ */
const groundMat = new THREE.MeshStandardMaterial({ color:0x070710, roughness:0.95, metalness:0.05 });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 1500), groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.02;
ground.receiveShadow = true;
scene.add(ground);

/* ============================================
   MATERIALS (shared)
   ============================================ */
const roadMat = new THREE.MeshStandardMaterial({ color:0x141420, roughness:0.35, metalness:0.4 });
const sideWalkMat = new THREE.MeshStandardMaterial({ color:0x1a1a2a, roughness:0.75, metalness:0.1 });
const poleMat = new THREE.MeshStandardMaterial({ color:0x333340, metalness:0.8, roughness:0.3 });
const markYellow = new THREE.MeshStandardMaterial({ color:0xffdd00, emissive:0xffdd00, emissiveIntensity:0.6 });
const markWhite = new THREE.MeshStandardMaterial({ color:0xcccccc, emissive:0xcccccc, emissiveIntensity:0.2 });

function neonMat(c, intensity=2) {
    return new THREE.MeshStandardMaterial({ color:c, emissive:c, emissiveIntensity:intensity });
}

/* ============================================
   CAR MODEL - PLAYER
   ============================================ */
function createPlayerCar(color) {
    const G = new THREE.Group();
    const bm = new THREE.MeshPhysicalMaterial({ color, metalness:0.92, roughness:0.12, clearcoat:1.0, clearcoatRoughness:0.04 });
    const bm2 = new THREE.MeshPhysicalMaterial({ color:new THREE.Color(color).multiplyScalar(0.7), metalness:0.92, roughness:0.12, clearcoat:1.0, clearcoatRoughness:0.04 });

    // === LOWER BODY ===
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.45, 5.0), bm);
    body.position.y = 0.42; body.castShadow = true; G.add(body);

    // Front slope
    const front = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.25, 1.3), bm);
    front.position.set(0, 0.57, 1.6); front.rotation.x = -0.12; front.castShadow = true; G.add(front);

    // Rear slope
    const rear = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.25, 1.0), bm);
    rear.position.set(0, 0.57, -1.7); rear.rotation.x = 0.1; rear.castShadow = true; G.add(rear);

    // === CABIN ===
    const cab = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.55, 1.9), bm2);
    cab.position.set(0, 0.97, -0.15); cab.castShadow = true; G.add(cab);

    // Roof
    const roof = new THREE.Mesh(new THREE.BoxGeometry(1.85, 0.06, 1.7), bm);
    roof.position.set(0, 1.27, -0.15); G.add(roof);

    // === GLASS ===
    const gl = new THREE.MeshPhysicalMaterial({ color:0x4488cc, metalness:0.15, roughness:0.05, transparent:true, opacity:0.35 });
    // Windshield
    const ws = new THREE.Mesh(new THREE.BoxGeometry(1.75, 0.5, 0.06), gl);
    ws.position.set(0, 1.0, 0.78); ws.rotation.x = -0.35; G.add(ws);
    // Rear window
    const rw = new THREE.Mesh(new THREE.BoxGeometry(1.75, 0.4, 0.06), gl);
    rw.position.set(0, 1.0, -1.1); rw.rotation.x = 0.35; G.add(rw);
    // Side windows
    [-1, 1].forEach(s => {
        const sw = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.35, 1.5), gl);
        sw.position.set(s*0.96, 1.0, -0.15); G.add(sw);
    });

    // === WHEELS ===
    const wGeo = new THREE.CylinderGeometry(0.34, 0.34, 0.22, 16);
    const wMat = new THREE.MeshStandardMaterial({ color:0x111111, metalness:0.6, roughness:0.35 });
    const rGeo = new THREE.TorusGeometry(0.22, 0.04, 6, 8);
    const rMat = new THREE.MeshStandardMaterial({ color:0xaaaaaa, metalness:0.9, roughness:0.1 });
    const wheelGroups = [];
    [[-1.12,0.34,1.5],[1.12,0.34,1.5],[-1.12,0.34,-1.4],[1.12,0.34,-1.4]].forEach(p => {
        const wg = new THREE.Group();
        const w = new THREE.Mesh(wGeo, wMat); w.rotation.z=Math.PI/2; wg.add(w);
        const r = new THREE.Mesh(rGeo, rMat); r.rotation.y=Math.PI/2; wg.add(r);
        wg.position.set(...p); wheelGroups.push(wg); G.add(wg);
    });

    // === HEADLIGHTS ===
    const hlM = new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xffffee, emissiveIntensity:4 });
    const hlG = new THREE.BoxGeometry(0.35, 0.14, 0.06);
    [-0.72, 0.72].forEach(x => { const h=new THREE.Mesh(hlG, hlM); h.position.set(x, 0.52, 2.53); G.add(h); });
    // DRL strip
    const drlM = neonMat(0xffffff, 1.5);
    const drl = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.03, 0.04), drlM);
    drl.position.set(0, 0.48, 2.53); G.add(drl);

    // === TAILLIGHTS ===
    const tlM = neonMat(0xff0000, 3);
    [-0.72, 0.72].forEach(x => { const t=new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.06), tlM); t.position.set(x, 0.52, -2.53); G.add(t); });
    // Tail strip
    const ts = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.04, 0.04), neonMat(0xff0000, 2));
    ts.position.set(0, 0.48, -2.53); G.add(ts);

    // === UNDERGLOW ===
    const ugm = neonMat(color, 2.5);
    ugm.transparent = true; ugm.opacity = 0.5;
    const ugPlane = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 5.2), ugm);
    ugPlane.rotation.x = -Math.PI/2; ugPlane.position.y = 0.04; G.add(ugPlane);
    // Side glow strips
    [-1.12, 1.12].forEach(x => {
        const sg = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 4.6), neonMat(color, 3));
        sg.position.set(x, 0.18, 0); G.add(sg);
    });

    // === SPOILER ===
    const spM = bm.clone();
    const sp = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.04, 0.28), spM);
    sp.position.set(0, 1.18, -2.15); G.add(sp);
    [-0.6, 0.6].forEach(x => {
        const sup = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.38, 0.06), spM);
        sup.position.set(x, 0.97, -2.15); G.add(sup);
    });

    // === EXHAUST ===
    const exM = new THREE.MeshStandardMaterial({ color:0x222222, metalness:0.9, roughness:0.2 });
    [-0.4, 0.4].forEach(x => {
        const ex = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 0.2, 8), exM);
        ex.rotation.x = Math.PI/2; ex.position.set(x, 0.22, -2.55); G.add(ex);
    });

    // === SIDE MIRRORS ===
    [-1.12, 1.12].forEach(x => {
        const mir = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.08, 0.12), bm);
        mir.position.set(x * 1.08, 0.85, 0.5); G.add(mir);
    });

    G.userData.wheels = wheelGroups;
    G.userData.underglow = ugPlane;
    return G;
}

/* ============================================
   TRAFFIC CAR MODEL
   ============================================ */
function createTrafficCar(color) {
    const G = new THREE.Group();
    const bm = new THREE.MeshPhysicalMaterial({ color, metalness:0.85, roughness:0.2, clearcoat:0.8, clearcoatRoughness:0.1 });

    const body = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.45, 4.6), bm);
    body.position.y = 0.42; body.castShadow = true; G.add(body);

    const cab = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 2.0), bm);
    cab.position.set(0, 0.92, -0.2); cab.castShadow = true; G.add(cab);

    // Glass
    const gl = new THREE.MeshPhysicalMaterial({ color:0x334466, transparent:true, opacity:0.3 });
    const ws = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.4, 0.05), gl);
    ws.position.set(0, 0.92, 0.78); ws.rotation.x = -0.3; G.add(ws);

    // Tail
    const tl = neonMat(0xff0000, 2.5);
    [-0.65, 0.65].forEach(x => {
        G.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.08, 0.05), tl), { position: new THREE.Vector3(x, 0.50, -2.33) }));
    });
    // Head
    const hl = neonMat(0xffffcc, 1.5);
    [-0.65, 0.65].forEach(x => {
        G.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.05), hl), { position: new THREE.Vector3(x, 0.50, 2.33) }));
    });
    // Wheels
    const wm = new THREE.MeshStandardMaterial({ color:0x111111, metalness:0.5, roughness:0.4 });
    [[-1.05,0.3,1.3],[1.05,0.3,1.3],[-1.05,0.3,-1.3],[1.05,0.3,-1.3]].forEach(p => {
        const w = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.18,10), wm);
        w.rotation.z=Math.PI/2; w.position.set(...p); G.add(w);
    });

    return G;
}

/* ============================================
   ROAD CHUNK + ENVIRONMENT
   ============================================ */
function createRoadChunk(seed) {
    const G = new THREE.Group();
    const rng = mulberry32(seed);

    // Road surface
    const road = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W+2, CHUNK), roadMat);
    road.rotation.x=-Math.PI/2; road.position.set(0,0,CHUNK/2); road.receiveShadow=true; G.add(road);

    // Sidewalks
    [-1,1].forEach(s=>{
        const sw=new THREE.Mesh(new THREE.BoxGeometry(SIDE_W,0.18,CHUNK), sideWalkMat);
        sw.position.set(s*(ROAD_W/2+SIDE_W/2+1),0.09,CHUNK/2); sw.receiveShadow=true; G.add(sw);
    });

    // Neon road edges
    [-1,1].forEach(s=>{
        const ne=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.06,CHUNK), neonMat(0xa855f7,2.5));
        ne.position.set(s*(ROAD_W/2+0.6),0.03,CHUNK/2); G.add(ne);
    });

    // Lane dashes
    for(let z=0;z<CHUNK;z+=5){
        // Center yellow
        const cy=new THREE.Mesh(new THREE.PlaneGeometry(0.12,2.5), markYellow);
        cy.rotation.x=-Math.PI/2; cy.position.set(0,0.005,z+1.25); G.add(cy);
        // White lanes
        for(let l=1;l<LANES;l++){
            if(l===Math.floor(LANES/2)) continue;
            const wl=new THREE.Mesh(new THREE.PlaneGeometry(0.08,2), markWhite);
            wl.rotation.x=-Math.PI/2; wl.position.set(-ROAD_W/2+l*LANE_W,0.005,z+1); G.add(wl);
        }
    }

    // === BUILDINGS ===
    [-1,1].forEach(side=>{
        let z=rng()*10;
        while(z<CHUNK-5){
            let w=8+rng()*18, h=12+rng()*55, d=6+rng()*14, gap=1+rng()*5;
            const bc=[0x0a0a18,0x0d0d22,0x08081a,0x101028,0x0c0c1e][Math.floor(rng()*5)];
            const bm=new THREE.MeshStandardMaterial({ color:bc, roughness:0.85, metalness:0.15 });
            const bld=new THREE.Mesh(new THREE.BoxGeometry(d,h,w), bm);
            const xp=side*(ROAD_W/2+SIDE_W+d/2+3);
            bld.position.set(xp,h/2,z+w/2); bld.castShadow=true; bld.receiveShadow=true; G.add(bld);

            // Neon accent strips on building face
            const nc=NEON_COLORS[Math.floor(rng()*NEON_COLORS.length)];
            const ns=1+Math.floor(rng()*3);
            for(let i=0;i<ns;i++){
                const sy=3+rng()*(h-8), sw2=w*(0.2+rng()*0.5);
                const strip=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.25,sw2), neonMat(nc,2+rng()*2));
                strip.position.set(xp+side*-(d/2+0.04),sy,z+w/2+(rng()-0.5)*w*0.2); G.add(strip);
            }

            // Window glow rows
            const wc=new THREE.Color().setHSL(0.08+rng()*0.12,0.25,0.45);
            const wm2=new THREE.MeshStandardMaterial({ color:wc, emissive:wc, emissiveIntensity:0.6 });
            for(let wy=4;wy<h-4;wy+=2.8+rng()*2){
                if(rng()>0.55) continue;
                const wr=new THREE.Mesh(new THREE.BoxGeometry(0.04,1.3,w*0.65), wm2);
                wr.position.set(xp+side*-(d/2+0.02),wy,z+w/2); G.add(wr);
            }

            // Rooftop features
            if(rng()>0.5 && h>25){
                const rtc=NEON_COLORS[Math.floor(rng()*NEON_COLORS.length)];
                const rtSign=new THREE.Mesh(new THREE.BoxGeometry(d*0.6,2,0.15), neonMat(rtc,3));
                rtSign.position.set(xp,h+1.5,z+w/2); G.add(rtSign);
            }

            z+=w+gap;
        }
    });

    // === STREETLIGHTS ===
    for(let z=15;z<CHUNK;z+=28){
        [-1,1].forEach(side=>{
            const x=side*(ROAD_W/2+2.2);
            // Pole
            const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.09,7,6), poleMat);
            pole.position.set(x,3.5,z); G.add(pole);
            // Arm
            const arm=new THREE.Mesh(new THREE.BoxGeometry(Math.abs(side)*2.8,0.06,0.06), poleMat);
            arm.position.set(x+side*-1.4,6.9,z); G.add(arm);
            // Fixture
            const fix=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.12,0.3), neonMat(0xffaa55,3));
            fix.position.set(x+side*-2.8,6.8,z); G.add(fix);
            // Downward glow cone (visual)
            const cone=new THREE.Mesh(
                new THREE.ConeGeometry(1.5,3,8,1,true),
                new THREE.MeshBasicMaterial({ color:0xffaa44, transparent:true, opacity:0.03, side:THREE.DoubleSide })
            );
            cone.position.set(x+side*-2.8,5.2,z); G.add(cone);
        });
    }

    return G;
}

// Simple seeded RNG
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

   COINS
   ============================================ */
const coinGeo = new THREE.TorusGeometry(0.35, 0.12, 8, 16);
const coinMat = new THREE.MeshStandardMaterial({ color:0xffd700, emissive:0xffd700, emissiveIntensity:1.5, metalness:0.95, roughness:0.05 });

function createCoin(){
    const c=new THREE.Mesh(coinGeo, coinMat);
    c.castShadow=true;
    return c;
}

/* ============================================
   PARTICLES
   ============================================ */
function createParticleSystem(count, color, size=0.15){
    const geo=new THREE.BufferGeometry();
    const pos=new Float32Array(count*3);
    const alphas=new Float32Array(count);
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('alpha',new THREE.BufferAttribute(alphas,1));
    const mat=new THREE.PointsMaterial({ color, size, transparent:true, opacity:0.7, blending:THREE.AdditiveBlending, depthWrite:false });
    const pts=new THREE.Points(geo, mat);
    pts.userData={vel:[],life:[],maxLife:60,idx:0};
    for(let i=0;i<count;i++){pts.userData.vel.push(new THREE.Vector3());pts.userData.life.push(0);}
    return pts;
}

function emitParticle(sys, x, y, z, vx, vy, vz, life=60){
    const i=sys.userData.idx;
    const pos=sys.geometry.attributes.position.array;
    pos[i*3]=x; pos[i*3+1]=y; pos[i*3+2]=z;
    sys.userData.vel[i].set(vx,vy,vz);
    sys.userData.life[i]=life;
    sys.userData.idx=(i+1)%sys.userData.vel.length;
}

function updateParticles(sys){
    const pos=sys.geometry.attributes.position.array;
    for(let i=0;i<sys.userData.vel.length;i++){
        if(sys.userData.life[i]>0){
            sys.userData.life[i]--;
            const v=sys.userData.vel[i];
            pos[i*3]+=v.x; pos[i*3+1]+=v.y; pos[i*3+2]+=v.z;
            v.y-=0.003; // gravity
        } else {
            pos[i*3]=0; pos[i*3+1]=-100; pos[i*3+2]=0;
        }
    }
    sys.geometry.attributes.position.needsUpdate=true;
}

/* ============================================
   GAME STATE
   ============================================ */
let running=false, playerCar, playerPos={x:0,z:0,targetX:0}, speed=0, baseSpeed=0;
let dist=0, coins_count=0, nitro=100, nitroOn=false, multi=1, multiT=0, dodges=0, best=0;
let chunks=[], trafficCars=[], coinObjs=[], frame=0;
let exhaustSys, nitroSys;
const keys={left:false,right:false,nitro:false};

/* ============================================
   INITIALIZATION
   ============================================ */
function initGame(){
    // Clear old
    chunks.forEach(c=>scene.remove(c));
    trafficCars.forEach(t=>scene.remove(t.mesh));
    coinObjs.forEach(c=>scene.remove(c.mesh));
    if(playerCar) scene.remove(playerCar);
    if(exhaustSys) scene.remove(exhaustSys);
    if(nitroSys) scene.remove(nitroSys);
    chunks=[]; trafficCars=[]; coinObjs=[];

    // Player car
    playerCar=createPlayerCar(CAR_COLORS[selColor].three);
    scene.add(playerCar);

    // Road chunks
    for(let i=0;i<POOL;i++){
        const ch=createRoadChunk(42+i*137);
        ch.position.z=i*CHUNK;
        scene.add(ch);
        chunks.push(ch);
    }

    // Particles
    exhaustSys=createParticleSystem(100,0x888888,0.12);
    scene.add(exhaustSys);
    nitroSys=createParticleSystem(150,0x06b6d4,0.25);
    scene.add(nitroSys);

    // Reset state
    playerPos={x:0,z:0,targetX:0};
    speed=0; baseSpeed=0.15; dist=0; coins_count=0;
    nitro=100; nitroOn=false; multi=1; multiT=0; dodges=0; frame=0;
    running=true;
}

/* ============================================
   START / MENU
   ============================================ */
function buildColorPicker(){
    const cp=document.getElementById('colorPicker');
    cp.innerHTML=CAR_COLORS.map((c,i)=>`<div class="color-btn ${i===selColor?'sel':''}" style="color:${c.hex}" onclick="window._selColor(${i})" title="${c.name}"></div>`).join('');
}
window._selColor=function(i){ selColor=i; buildColorPicker(); };
buildColorPicker();

window.startGame=function(){
    document.getElementById('menu').classList.add('hide');
    document.getElementById('gameOver').classList.remove('on');
    document.getElementById('hud').classList.add('on');
    document.getElementById('speedometer').classList.add('on');
    document.getElementById('nitroWrap').classList.add('on');
    initGame();
};

window.toMenu=function(){
    running=false;
    document.getElementById('gameOver').classList.remove('on');
    document.getElementById('menu').classList.remove('hide');
    document.getElementById('hud').classList.remove('on');
    document.getElementById('speedometer').classList.remove('on');
    document.getElementById('nitroWrap').classList.remove('on');
};

/* ============================================
   GAME UPDATE
   ============================================ */
function update(){
    if(!running) return;
    frame++;

    // === SPEED ===
    baseSpeed = 0.15 + dist*0.000015;
    let curSpeed = baseSpeed;
    if(nitroOn && nitro>0){ curSpeed*=1.7; nitro-=0.4; if(nitro<0)nitro=0; }
    else { nitroOn=false; if(nitro<100)nitro+=0.06; }
    speed += (curSpeed-speed)*0.05;
    dist += speed*3;

    // === STEERING ===
    const handling = 0.18;
    if(keys.left) playerPos.targetX -= handling;
    if(keys.right) playerPos.targetX += handling;
    const maxX = ROAD_W/2 - 1.5;
    playerPos.targetX = Math.max(-maxX, Math.min(maxX, playerPos.targetX));
    playerPos.x += (playerPos.targetX - playerPos.x) * 0.1;
    playerPos.z += speed;

    // Car position
    playerCar.position.set(playerPos.x, 0, playerPos.z);
    const tilt = (playerPos.targetX-playerPos.x)*5;
    playerCar.rotation.y = -tilt*0.02;
    playerCar.rotation.z = -tilt*0.015;

    // Wheel rotation
    playerCar.userData.wheels.forEach(w=>{ w.children[0].rotation.x-=speed*2; });

    // Underglow pulse
    const ugOp = 0.35+Math.sin(frame*0.05)*0.15;
    playerCar.userData.underglow.material.opacity = ugOp;

    // === CAMERA ===
    const camDist = nitroOn ? 14 : 11;
    const camH = nitroOn ? 5.5 : 4.5;
    const camTargetX = playerPos.x*0.4;
    camera.position.x += (camTargetX - camera.position.x)*0.05;
    camera.position.y += (camH - camera.position.y)*0.03;
    camera.position.z += (playerPos.z-camDist - camera.position.z)*0.08;
    camera.lookAt(playerPos.x*0.6, 1.2, playerPos.z+15);
    camera.fov += ((nitroOn?75:68)-camera.fov)*0.05;
    camera.updateProjectionMatrix();

    // Headlights
    headlightL.position.set(playerPos.x-0.7, 0.6, playerPos.z+2.5);
    headlightR.position.set(playerPos.x+0.7, 0.6, playerPos.z+2.5);
    hlTarget.position.set(playerPos.x, 0, playerPos.z+50);

    // Moon follows player
    moonLight.position.set(playerPos.x-30, 50, playerPos.z+30);
    moonLight.target.position.set(playerPos.x, 0, playerPos.z);
    moonLight.target.updateMatrixWorld();

    // Ground follows
    ground.position.z = playerPos.z;

    // Sky follows
    skyGeo.parent && (skyGeo.parent.position || (scene.children.find(c=>c.geometry===skyGeo)||{}).position||{}).z;
    // Stars follow
    scene.children.forEach(c=>{ if(c.isPoints&&c.geometry===starsGeo) c.position.z=playerPos.z; });

    // === STREETLIGHTS (recycle pool) ===
    for(let i=0;i<stLights.length;i++){
        const side=i%2===0?-1:1;
        const idx=Math.floor(i/2);
        const z=Math.floor(playerPos.z/28)*28+idx*28-14;
        stLights[i].position.set(side*(ROAD_W/2-0.5), 6, z);
    }

    // === CHUNK RECYCLING ===
    chunks.forEach(ch=>{
        while(playerPos.z-ch.position.z>CHUNK*2){
            let maxZ=-Infinity;
            chunks.forEach(c2=>{ if(c2.position.z>maxZ)maxZ=c2.position.z; });
            ch.position.z=maxZ+CHUNK;
        }
    });

    // === TRAFFIC ===
    // Spawn
    if(frame%Math.max(18, 55-Math.floor(dist/300))===0){
        const lane=Math.floor(Math.random()*LANES);
        const lx=-ROAD_W/2+LANE_W/2+lane*LANE_W;
        const tz=playerPos.z+80+Math.random()*40;
        // Check no overlap
        const overlap=trafficCars.some(t=>Math.abs(t.x-lx)<LANE_W*0.8 && Math.abs(t.z-tz)<8);
        if(!overlap){
            const tc=createTrafficCar(TRAFFIC_COLORS[Math.floor(Math.random()*TRAFFIC_COLORS.length)]);
            tc.position.set(lx,0,tz);
            scene.add(tc);
            const tspeed=0.5+Math.random()*1.5;
            trafficCars.push({mesh:tc,x:lx,z:tz,speed:tspeed,lane});
        }
    }

    // Update traffic
    for(let i=trafficCars.length-1;i>=0;i--){
        const t=trafficCars[i];
        t.z+=(speed-t.speed*0.3)*0.3;
        t.mesh.position.z=t.z;
        // Remove if behind
        if(t.z<playerPos.z-30){ scene.remove(t.mesh); trafficCars.splice(i,1); dodges++; if(dodges%8===0){multi=Math.min(5,multi+1);multiT=300;} continue; }
        if(t.z>playerPos.z+150){ scene.remove(t.mesh); trafficCars.splice(i,1); continue; }
        // Collision
        if(Math.abs(playerPos.x-t.x)<1.8 && Math.abs(playerPos.z-t.z)<4){
            gameOver(); return;
        }
    }

    // === COINS ===
    if(frame%25===0){
        const lane=Math.floor(Math.random()*LANES);
        const cx=-ROAD_W/2+LANE_W/2+lane*LANE_W;
        const cz=playerPos.z+60+Math.random()*30;
        const c=createCoin();
        c.position.set(cx,1.2,cz);
        scene.add(c);
        coinObjs.push({mesh:c,z:cz});
    }
    for(let i=coinObjs.length-1;i>=0;i--){
        const c=coinObjs[i];
        c.mesh.rotation.y+=0.06;
        c.mesh.rotation.x=Math.sin(frame*0.03+i)*0.3;
        c.mesh.position.y=1.2+Math.sin(frame*0.04+i)*0.15;
        if(c.z<playerPos.z-15){ scene.remove(c.mesh); coinObjs.splice(i,1); continue; }
        if(Math.abs(playerPos.x-c.mesh.position.x)<1.5 && Math.abs(playerPos.z-c.z)<2.5){
            scene.remove(c.mesh); coinObjs.splice(i,1);
            coins_count+=multi;
            // Sparkle particles
            for(let p=0;p<8;p++) emitParticle(nitroSys, c.mesh.position.x+(Math.random()-.5), 1.5, c.z, (Math.random()-.5)*.1, Math.random()*.1, (Math.random()-.5)*.1, 30);
        }
    }

    // === MULTIPLIER ===
    if(multiT>0){ multiT--; if(multiT<=0) multi=1; }

    // === PARTICLES ===
    // Exhaust
    if(frame%2===0){
        [-0.4,0.4].forEach(ox=>{
            emitParticle(exhaustSys, playerPos.x+ox, 0.25, playerPos.z-2.6, (Math.random()-.5)*0.02, 0.01+Math.random()*0.02, -0.05-Math.random()*0.03, 40);
        });
    }
    // Nitro particles
    if(nitroOn){
        for(let p=0;p<3;p++){
            [-0.4,0.4].forEach(ox=>{
                emitParticle(nitroSys, playerPos.x+ox+(Math.random()-.5)*0.3, 0.3+Math.random()*0.2, playerPos.z-2.7, (Math.random()-.5)*0.05, Math.random()*0.05, -0.15-Math.random()*0.1, 25);
            });
        }
    }
    updateParticles(exhaustSys);
    updateParticles(nitroSys);

    // === SPEED LINES ===
    document.getElementById('speedLines').classList.toggle('on', speed>0.35 || nitroOn);

    // === HUD ===
    const kmh=Math.floor(speed*350);
    document.getElementById('hDist').textContent=Math.floor(dist)+'m';
    document.getElementById('hCoins').textContent=coins_count;
    document.getElementById('hMulti').textContent='x'+multi;
    document.getElementById('speedVal').textContent=kmh;
    document.getElementById('speedArc').style.strokeDashoffset = 377 - Math.min(377, kmh/350*377);
    document.getElementById('nitroFill').style.height=nitro+'%';
}

/* ============================================
   GAME OVER
   ============================================ */
function gameOver(){
    running=false;
    const d=Math.floor(dist), c=coins_count;
    best=Math.max(best,d);
    document.getElementById('goStats').innerHTML=`
        <div class="go-stat"><div class="v">${d}m</div><div class="l">DYSTANS</div></div>
        <div class="go-stat"><div class="v">${best}m</div><div class="l">REKORD</div></div>
        <div class="go-stat"><div class="v">${c}</div><div class="l">MONETY</div></div>
        <div class="go-stat"><div class="v">${Math.floor(speed*350)}</div><div class="l">KM/H</div></div>`;
    document.getElementById('goReward').textContent=d===best?'🏆 NOWY REKORD!':'💰 +'+c+' monet';
    document.getElementById('gameOver').classList.add('on');
    try{window.parent.postMessage({type:'azra_score',score:Math.floor(d/5)+c*10},'*')}catch(e){}
}

    composer.render();
}

    }
});

// Mobile
const mobL=document.getElementById('mobL'),mobR=document.getElementById('mobR'),mobN=document.getElementById('mobN');
['touchstart','mousedown'].forEach(ev=>{
    mobL.addEventListener(ev,e=>{e.preventDefault();keys.left=true});
    mobR.addEventListener(ev,e=>{e.preventDefault();keys.right=true});
    mobN.addEventListener(ev,e=>{e.preventDefault();keys.nitro=true;nitroOn=true});
});
['touchend','mouseup','touchcancel'].forEach(ev=>{
    mobL.addEventListener(ev,()=>keys.left=false);
    mobR.addEventListener(ev,()=>keys.right=false);
    mobN.addEventListener(ev,()=>keys.nitro=false);
});

// Touch swipe
let touchX=null;
renderer.domElement.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX},{passive:true});
renderer.domElement.addEventListener('touchmove',e=>{
    if(touchX!==null){
        const d=e.touches[0].clientX-touchX;
        if(Math.abs(d)>3){keys.left=d<0;keys.right=d>0;touchX=e.touches[0].clientX}
    }
},{passive:true});
renderer.domElement.addEventListener('touchend',()=>{keys.left=false;keys.right=false;touchX=null},{passive:true});

/* ============================================
   RESIZE
   ============================================ */
window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
    composer.setSize(window.innerWidth,window.innerHeight);
    bloomPass.resolution.set(window.innerWidth,window.innerHeight);
});

/* ============================================
   START
   ============================================ */
document.getElementById('loading').classList.add('hide');
setTimeout(()=>document.getElementById('loading').remove(),600);
animate();

</script>
</body>
